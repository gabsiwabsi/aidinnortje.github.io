  <script>
    const DEFAULT_ROLE = "Writing, Production, Mixing";
    const WRIT_PROD_MIS_MAS_ROLE = "Writing, Production, Mixing, Mastering";
    const EVERYTHING_ROLE = "Singing, Songwriting, Production, Mixing, Mastering";
    const WRITE_PROD_ROLE = "Writing, Production";

    // Add artist names here (and optionally titles if you want to override)
    const releases = [
      { url: "https://open.spotify.com/track/0xLPuvFdAvOVpLb0DtqSdg", artist: "Ben Rodrigues", role: WRIT_PROD_MIS_MAS_ROLE },
      { url: "https://open.spotify.com/track/6e67jV14CqsB6b6cZKoGd6", artist: "Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/67KTEMcMLq0rrByxzzZku8", artist: "Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/1lmtbdnwqEkrtVQhDQvw1E", artist: "Booshle G", role: WRITE_PROD_ROLE },
      { url: "https://open.spotify.com/track/1hUZKKbV2eCwUftVeJYJLF", artist: "Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/23kB40iILpGJ03qrMTGbyj", artist: "Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/0HM8upO733cghrlIWcS7hK", artist: "Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/46XLSMbxnqRAoFTk58lxth", artist: "David Derman", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/7wI19ThH9yf95MOHcCG6U5", artist: "We Could Be Related, Ben Rodrigues", role: DEFAULT_ROLE },
      { url: "https://open.spotify.com/track/4Z4xlEo0iuCIp8JCdllzTY", artist: "Eva Marie", role: WRIT_PROD_MIS_MAS_ROLE },
      { url: "https://open.spotify.com/track/4TqFV77SI0u0WtiHsmUQPW", artist: "We Could Be Related", role: EVERYTHING_ROLE },
      { url: "https://open.spotify.com/track/61Ny7MvlgnOqrIKwxhc11T", artist: "We Could Be Related", role: EVERYTHING_ROLE }
    ];

    const grid = document.getElementById("discographyGrid");

    // Scroll reveal observer (replays on every scroll)
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
          } else {
            entry.target.classList.remove("is-visible");
          }
        });
      },
      {
        threshold: 0.15
      }
    );


    async function fetchOEmbed(url) {
      const res = await fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`);
      if (!res.ok) throw new Error("Failed to fetch Spotify oEmbed");
      return res.json();
    }

    async function render() {
      for (const item of releases) {
        try {
          const data = await fetchOEmbed(item.url);

          const trackTitle = (data.title || "").trim() || "Untitled";
          const artistName = (item.artist || "").trim() || "";

          const tile = document.createElement("div");
          tile.className = "tile";
          tile.tabIndex = 0;
          tile.setAttribute("role", "button");
          tile.setAttribute("aria-label", `Play ${trackTitle} on Spotify`);

          tile.addEventListener("click", () => playTrack(item.url));
          tile.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") playTrack(item.url);
          });


          tile.innerHTML = `
  <div class="cover">
    <img src="${data.thumbnail_url}" alt="${trackTitle}">
  </div>

  <div class="meta">
    <div class="title">${trackTitle}</div>
    <div class="artist">${artistName}</div>
    <div class="role">${item.role || DEFAULT_ROLE}</div>
  </div>
`;


          grid.appendChild(tile);

          // trigger scroll animation
          observer.observe(tile);

        } catch (e) {
          console.warn("Could not load:", item.url, e);
        }
      }
    }

    render();

    const playerBar = document.getElementById("playerBar");
    const spotifyPlayer = document.getElementById("spotifyPlayer");
    const closePlayer = document.getElementById("closePlayer");

    function getTrackId(spotifyUrl) {
      // supports: https://open.spotify.com/track/{id}
      const m = spotifyUrl.match(/open\.spotify\.com\/track\/([a-zA-Z0-9]+)/);
      return m ? m[1] : null;
    }

    function isMobile() {
      return window.matchMedia("(max-width: 720px)").matches ||
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function playTrack(spotifyUrl) {
      const id = getTrackId(spotifyUrl);
      if (!id) return;

      const embedUrl = `https://open.spotify.com/embed/track/${id}`;
      const openUrl = `https://open.spotify.com/track/${id}`;

      if (isMobile()) {
        // best UX on phones: open Spotify directly
        window.open(openUrl, "_blank", "noopener,noreferrer");
        return;
      }

      // desktop: use your sticky embed player
      spotifyPlayer.src = embedUrl;
      playerBar.classList.remove("is-hidden");
      playerBar.classList.add("pulse");
      setTimeout(() => playerBar.classList.remove("pulse"), 900);
    }

    closePlayer.addEventListener("click", () => {
      spotifyPlayer.src = ""; // stops playback
      playerBar.classList.add("is-hidden");
    });

    // =============================
    // LIVE STREAMS COUNTER (STATIC)
    // =============================

    // Put your static numbers here:
    const STATIC_YOUTUBE_VIEWS = 7646856;
    const STATIC_SPOTIFY_VIEWS = 35494213;
    const STATIC_OTHER_VIEWS = 285830;

    // Set the "last updated" date here:
    const LAST_UPDATED = "16 Feb 2026";

    function fmt(n) {
      return Number(n).toLocaleString();
    }

    function fmt(n) {
      return Number(n).toLocaleString();
    }

    function animateNumber(el, toValue, durationMs = 1600) {
      const startValue = 0;
      const start = performance.now();

      // smooth, "premium" easing
      function easeOutExpo(x) {
        return x === 1 ? 1 : 1 - Math.pow(2, -10 * x);
      }

      function tick(t) {
        const progress = Math.min(1, (t - start) / durationMs);
        const eased = easeOutExpo(progress);

        const value = Math.floor(startValue + (toValue - startValue) * eased);
        el.textContent = fmt(value);

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          el.classList.add("counter-pop");
          setTimeout(() => el.classList.remove("counter-pop"), 500);
        }
      }

      requestAnimationFrame(tick);
    }

    (function initStaticStreams() {
      const section = document.getElementById("liveStreams");

      const elTotal = document.getElementById("streamsTotal");
      const elYT = document.getElementById("streamsYoutube");
      const elSpotify = document.getElementById("streamsSpotify");
      const elOther = document.getElementById("streamsOther");
      const elStatus = document.getElementById("streamsStatus");

      if (!section || !elTotal || !elYT || !elSpotify || !elOther || !elStatus) return;

      // Set status first (so it doesn't look empty)
      elStatus.textContent = `Last updated: ${LAST_UPDATED}`;

      // Turn on the reveal class slightly after page load, so it feels intentional
      setTimeout(() => section.classList.add("counter-on"), 250);

      const grandTotal = STATIC_YOUTUBE_VIEWS + STATIC_SPOTIFY_VIEWS + STATIC_OTHER_VIEWS;

      // Staggered animations (feels slick)
      setTimeout(() => animateNumber(elTotal, grandTotal, 1700), 350);
      setTimeout(() => animateNumber(elSpotify, STATIC_SPOTIFY_VIEWS, 1300), 650);
      setTimeout(() => animateNumber(elYT, STATIC_YOUTUBE_VIEWS, 1300), 850);
      setTimeout(() => animateNumber(elOther, STATIC_OTHER_VIEWS, 1100), 1050);
    })();

  </script>

      const loader = document.getElementById("page-loader");

    });
  </script>
