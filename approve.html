<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approve Booking — Aidin Nortje</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .approve-wrap {
      max-width: 520px;
      padding: 80px 0;
      text-align: center;
    }
    .approve-icon { font-size: 48px; margin-bottom: 20px; }
    .approve-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
    .approve-sub {
      font-size: 14px;
      opacity: 0.55;
      line-height: 1.7;
      margin: 0 0 32px;
    }
    .approve-btn {
      display: inline-block;
      padding: 14px 28px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 200ms ease;
    }
    .approve-btn:hover { opacity: 0.75; }
    .approve-btn--approve { background: #111; color: #fff; }
    .approve-btn--reject  { background: transparent; color: #111; border: 1px solid rgba(0,0,0,0.25); margin-left: 10px; }
    .approve-loading { opacity: 0.5; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-inner">
      <a class="page-brand split-brand" href="index.html" aria-label="Home">
        <span class="split-brand__text" data-text="AIDIN NORTJE">AIDIN NORTJE</span>
      </a>
    </div>
  </header>

  <main class="container page-content">
    <div class="approve-wrap" id="approve-wrap">
      <div class="approve-icon" id="approve-icon">⏳</div>
      <h1 class="approve-title" id="approve-title">Loading...</h1>
      <p class="approve-sub" id="approve-sub"></p>
      <div id="approve-actions"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL     = "https://zmqpgkglkrhwkffqlfuk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptcXBna2dsa3Jod2tmZnFsZnVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzkxOTAsImV4cCI6MjA5NjcxNTE5MH0.wLt6mJ2LbctI0dWFm2cmyd4T_THTLKXR_Xm11JK_31o";
    
    // Resend email sending for approval/rejection confirmations
    const NOTIFY_FUNCTION_URL = "YOUR_SUPABASE_FUNCTION_URL/booking-status";

    const params = new URLSearchParams(window.location.search);
    const id     = params.get("id");
    const action = params.get("action"); // "approve" | "reject"

    const icon    = document.getElementById("approve-icon");
    const title   = document.getElementById("approve-title");
    const sub     = document.getElementById("approve-sub");
    const actions = document.getElementById("approve-actions");

    async function getBooking() {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}&select=*`,
        { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const rows = await res.json();
      return rows[0];
    }

    async function updateStatus(newStatus) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`,
        {
          method: "PATCH",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
          },
          body: JSON.stringify({ status: newStatus })
        }
      );
      const rows = await res.json();
      return rows[0];
    }

    async function init() {
      if (!id) {
        icon.textContent = "❌";
        title.textContent = "Invalid Link";
        sub.textContent = "This approval link is missing a booking ID.";
        return;
      }

      const booking = await getBooking();
      if (!booking) {
        icon.textContent = "❌";
        title.textContent = "Not Found";
        sub.textContent = "This booking could not be found.";
        return;
      }

      if (booking.status !== "pending") {
        icon.textContent = booking.status === "approved" ? "✓" : "✕";
        title.textContent = booking.status === "approved" ? "Already Approved" : "Already Rejected";
        sub.textContent = `This booking has already been ${booking.status}.`;
        return;
      }

      const dateFormatted = new Date(booking.date + "T12:00:00")
        .toLocaleDateString("en-GB", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
      const slotLabel = booking.slot === "morning" ? "Morning (10am–2pm)" : "Afternoon (2pm–6pm)";

      icon.textContent = "📋";
      title.textContent = "Review Booking";
      sub.innerHTML = `<strong>${booking.client_name}</strong><br>${booking.client_email}<br><br>${dateFormatted}<br>${slotLabel}`;

      if (action === "approve" || action === "reject") {
        // Auto-action from email link
        await doAction(action, booking);
      } else {
        // Manual buttons
        actions.innerHTML = `
          <button class="approve-btn approve-btn--approve" onclick="doAction('approve')">Approve</button>
          <button class="approve-btn approve-btn--reject"  onclick="doAction('reject')">Reject</button>`;
      }
    }

    async function doAction(act, booking) {
      actions.innerHTML = `<p class="approve-loading">Processing...</p>`;
      const updated = await updateStatus(act);

      if (act === "approve") {
        icon.textContent = "✓";
        title.textContent = "Booking Approved";
        sub.textContent = `${updated.client_name} has been confirmed for their session. A confirmation email has been sent to ${updated.client_email}.`;
      } else {
        icon.textContent = "✕";
        title.textContent = "Booking Rejected";
        sub.textContent = `The booking for ${updated.client_name} has been rejected. They will be notified by email.`;
      }
      actions.innerHTML = "";

      // Trigger status email via edge function
      await fetch(NOTIFY_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ booking: updated, action: act })
      }).catch(() => {});
    }

    init();
  </script>
</body>
</html>
